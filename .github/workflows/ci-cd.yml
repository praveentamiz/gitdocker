name: CI/CD Pipeline - LimsApi & Angular

on:
  push:
    branches:
      - main
      - release/production-deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      OUTPUT_ROOT: /home/ubuntu/build-output
      NUGET_PACKAGES: /home/ubuntu/nuget-packages
      NODE_OPTIONS: "--openssl-legacy-provider"
      DOCKER_IMAGE: myrepo/lims-app:latest
      KUBECONFIG: ${{ secrets.KUBECONFIG }}

    steps:
    # -------------------------
    # Checkout code
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v3

    # -------------------------
    # Setup .NET SDK
    # -------------------------
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # -------------------------
    # Loop through .NET projects
    # -------------------------
    - name: Build .NET projects
      run: |
        projects=(
          "Backend/msplusmapi/LimsApi.csproj"
          "Backend/msplgatewayapi/Gateway.csproj"
          "Backend/msplutilapi/Util.csproj"
        )
        mkdir -p $OUTPUT_ROOT
        for proj in "${projects[@]}"; do
          echo "🔹 Building $proj"
          dotnet restore "$proj" --packages $NUGET_PACKAGES
          dotnet build "$proj" --configuration Release
          dotnet publish "$proj" --configuration Release --output "$OUTPUT_ROOT/$(basename $proj .csproj)"
        done

    # -------------------------
    # Angular Frontend Build
    # -------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Build Angular projects
      run: |
        angular_projects=(
          "Frontend/msplusmclient"
          "Frontend/msplqmsclient"
        )
        for proj in "${angular_projects[@]}"; do
          echo "🔹 Building $proj"
          cd $proj
          npm install --legacy-peer-deps
          npx ng build --configuration production
          mkdir -p $OUTPUT_ROOT/$(basename $proj)
          cp -r dist/* $OUTPUT_ROOT/$(basename $proj)/
          cd ../../
        done

    # -------------------------
    # Docker build & push
    # -------------------------
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t $DOCKER_IMAGE .

    - name: Push Docker image
      run: docker push $DOCKER_IMAGE

    # -------------------------
    # Kubernetes Deployment
    # -------------------------
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.30.0'

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl rollout status deployment/lims-app
