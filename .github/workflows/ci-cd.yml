name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - release/production-deployment

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      DOTNET_ROOT: /usr/share/dotnet
      NODE_OPTIONS: "--openssl-legacy-provider"

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ===== DOTNET BACKEND =====
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore .NET dependencies
      run: dotnet restore ./LimsApi/LimsApi.csproj

    - name: Build .NET backend
      run: dotnet build ./LimsApi/LimsApi.csproj --configuration Release

    - name: Publish .NET backend
      run: dotnet publish ./LimsApi/LimsApi.csproj -c Release -o ./publish/backend

    # ===== ANGULAR FRONTEND =====
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Angular dependencies
      working-directory: ./limsui
      run: npm install --legacy-peer-deps

    - name: Build Angular frontend
      working-directory: ./limsui
      run: npx ng build --configuration production

    - name: Copy Angular dist to publish folder
      run: |
        mkdir -p ./publish/frontend
        cp -r ./limsui/dist/* ./publish/frontend/

    # ===== DOCKER IMAGE =====
    - name: Build Docker image
      run: docker build -t myrepo/lims-app:latest .

    - name: Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: myrepo/lims-app:latest

    # ===== KUBERNETES DEPLOY =====
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.30.0'

    - name: Deploy to Kubernetes
      env:
        KUBECONFIG: ${{ secrets.KUBECONFIG }}
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl rollout status deployment/lims-app
